<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA 23 — Top 20 Players</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #001f5b;
            color: #ffffff;
            font-family: 'Roboto', Arial, sans-serif;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #intro {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: #001f5b;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeOutOverlay 0.5s ease 2s forwards;
        }

        @keyframes fadeOutOverlay {
            to { opacity: 0; pointer-events: none; }
        }

        #ball {
            position: absolute;
            font-size: 80px;
            left: -100px;
            top: 50%;
            transform: translateY(-50%);
            animation: shootBall 1.6s cubic-bezier(0.25, 0.1, 0.25, 1) 0.2s forwards;
        }

        @keyframes shootBall {
            0%   { left: -100px; transform: translateY(-50%) rotate(0deg); opacity: 1; }
            60%  { left: 45vw;   transform: translateY(-50%) rotate(540deg); opacity: 1; }
            80%  { left: 50vw;   transform: translateY(-50%) rotate(720deg) scale(1.3); opacity: 1; }
            100% { left: 110vw;  transform: translateY(-50%) rotate(1080deg); opacity: 0.3; }
        }

        #trail {
            position: absolute;
            top: 50%;
            left: 0;
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(200,168,75,0.2), rgba(200,168,75,0.8));
            transform: translateY(-50%);
            border-radius: 2px;
            animation: trailGrow 1.6s cubic-bezier(0.25, 0.1, 0.25, 1) 0.2s forwards;
        }

        @keyframes trailGrow {
            0%   { width: 0%; opacity: 0; }
            60%  { width: 47%; opacity: 1; }
            80%  { width: 52%; opacity: 1; }
            100% { width: 100%; opacity: 0; }
        }

        #flash {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(200,168,75,0.3), transparent 60%);
            opacity: 0;
            animation: flashEffect 0.3s ease 1.0s forwards;
        }

        @keyframes flashEffect {
            0%   { opacity: 0; }
            50%  { opacity: 1; }
            100% { opacity: 0; }
        }

        #main-content {
            opacity: 0;
            animation: fadeInContent 0.8s ease 2.2s forwards;
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            padding: 48px 40px 24px;
            border-bottom: 2px solid #c8a84b;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        /* WATERMARK — bumped from 0.06 to 0.10 */
        .header::after {
            content: '⚽';
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 200px;
            opacity: 0.10;
            transform: rotate(15deg);
            pointer-events: none;
            line-height: 1;
        }

        .header::before {
            content: '⚽';
            position: absolute;
            top: 12px;
            left: 20px;
            font-size: 28px;
            opacity: 0.4;
            pointer-events: none;
        }

        .header .eyebrow {
            font-size: 11px;
            letter-spacing: 6px;
            color: #c8a84b;
            text-transform: uppercase;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-family: 'Bebas Neue', 'Arial Black', sans-serif;
            font-size: 80px;
            color: #ffffff;
            letter-spacing: 8px;
            line-height: 1;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .header h1 span { color: #c8a84b; }

        .header .subtitle {
            font-size: 12px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        #chart {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 40px 60px;
        }

        .col-headers {
            display: flex;
            align-items: center;
            padding: 0 0 12px 0;
            border-bottom: 1px solid rgba(200,168,75,0.3);
            margin-bottom: 8px;
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }

        .col-rank { width: 40px; }
        .col-name { width: 220px; }
        .col-pos  { width: 60px; }
        .col-nat  { width: 160px; }
        .col-bar  { flex: 1; }
        .col-ovr  { width: 50px; text-align: right; }

        .player-row {
            display: flex;
            align-items: center;
            padding: 10px 0 10px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            border-left: 3px solid transparent;
            cursor: pointer;
            position: relative;
            opacity: 0;
            transform: translateX(-20px);
            transition: background 0.2s, opacity 0.5s ease, transform 0.5s ease,
                        border-left-color 0.2s, box-shadow 0.2s;
        }

        .player-row.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .player-row:hover {
            background: rgba(200,168,75,0.12);
            border-left: 3px solid #c8a84b;
            border-radius: 0 6px 6px 0;
            box-shadow: inset 0 0 40px rgba(200,168,75,0.06),
                        0 2px 16px rgba(200,168,75,0.08);
            z-index: 200;
            position: relative;
        }

        .player-row:hover .player-name { color: #c8a84b; }
        .player-row:hover .nationality { color: #ffffff; }
        .player-row:hover .flag {
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.6));
            transform: scale(1.2);
        }
        .player-row:hover .rank        { color: #f0d060; }
        .player-row:hover .overall     { color: #f0d060; text-shadow: 0 0 12px rgba(240,208,96,0.5); }
        .player-row:hover .bar-fill    { background: linear-gradient(90deg, #d4a84b, #ffe066); box-shadow: 0 0 8px rgba(200,168,75,0.4); }

        .rank {
            width: 40px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: rgba(200,168,75,0.4);
            transition: color 0.2s;
        }

        .rank.top { color: #c8a84b; }

        .player-name {
            width: 220px;
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }

        .position-badge { width: 60px; }

        .position-badge span {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .pos-ST  { background: rgba(231,76,60,0.25);   color: #e74c3c; border: 1px solid #e74c3c; }
        .pos-RW, .pos-LW { background: rgba(241,196,15,0.2); color: #f1c40f; border: 1px solid #f1c40f; }
        .pos-CM, .pos-CDM { background: rgba(52,152,219,0.2); color: #3498db; border: 1px solid #3498db; }
        .pos-CB  { background: rgba(46,204,113,0.2);  color: #2ecc71; border: 1px solid #2ecc71; }
        .pos-GK  { background: rgba(155,89,182,0.2);  color: #9b59b6; border: 1px solid #9b59b6; }

        .nationality {
            width: 160px;
            font-size: 12px;
            color: rgba(255,255,255,0.75);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .flag {
            font-size: 18px;
            line-height: 1;
            transition: filter 0.2s, transform 0.2s;
        }

        .bar-container {
            flex: 1;
            height: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            overflow: hidden;
            margin-right: 16px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 5px;
            background: linear-gradient(90deg, #c8a84b, #f0d060);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                        background 0.2s, box-shadow 0.2s;
        }

        .overall {
            width: 50px;
            text-align: right;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: #c8a84b;
            transition: color 0.2s, text-shadow 0.2s;
        }

        .overall.top { color: #f0d060; font-size: 28px; }

        .stats-panel {
            display: none;
            position: absolute;
            right: 0;
            width: 320px;
            background: #0a2a6e;
            border: 1px solid rgba(200,168,75,0.4);
            border-radius: 8px;
            padding: 16px;
            z-index: 300;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .stats-panel.above { bottom: 52px; }
        .stats-panel.below { top: 52px; }

        .player-row:hover .stats-panel { display: block; }

        .stats-panel .panel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .panel-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a3a80, #2a50a0);
            border: 2px solid #c8a84b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            color: #c8a84b;
            flex-shrink: 0;
        }

        .stats-panel .panel-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: #c8a84b;
            letter-spacing: 2px;
            line-height: 1;
        }

        .stats-panel .panel-meta {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .panel-divider {
            border: none;
            border-top: 1px solid rgba(200,168,75,0.2);
            margin-bottom: 12px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .stat-label {
            width: 110px;
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }

        .stat-bar-bg {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
            margin: 0 10px;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #c8a84b, #f0d060);
        }

        .stat-value {
            width: 28px;
            text-align: right;
            font-size: 12px;
            font-weight: 700;
            color: #ffffff;
        }

        .footer {
            text-align: center;
            padding: 24px;
            border-top: 1px solid rgba(200,168,75,0.2);
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="intro">
        <div id="trail"></div>
        <div id="flash"></div>
        <div id="ball">⚽</div>
    </div>

    <div id="main-content">
        <div class="header">
            <div class="eyebrow">EA Sports · Official Ratings</div>
            <h1>TOP <span>20</span> PLAYERS</h1>
            <div class="subtitle">FIFA 23 · World's Best · Overall Rating</div>
        </div>

        <div id="chart">
            <div class="col-headers">
                <div class="col-rank">#</div>
                <div class="col-name">Player</div>
                <div class="col-pos">Pos</div>
                <div class="col-nat">Nation</div>
                <div class="col-bar">Rating</div>
                <div class="col-ovr">OVR</div>
            </div>
            <div id="rows"></div>
        </div>

        <div class="footer">Data: EA Sports FIFA 23 · Visualization: Anubhav Rastogi · anubhav-rastogi.com</div>
    </div>

    <script>
        const players = [
            { name: "Lionel Messi",         overall: 91, nationality: "Argentina",   flag: "🇦🇷", position: "RW",  pace: 85, shooting: 92, passing: 91, dribbling: 95, defending: 34, physicality: 65 },
            { name: "Erling Haaland",        overall: 91, nationality: "Norway",      flag: "🇳🇴", position: "ST",  pace: 89, shooting: 94, passing: 65, dribbling: 80, defending: 45, physicality: 88 },
            { name: "Kylian Mbappé",         overall: 91, nationality: "France",      flag: "🇫🇷", position: "ST",  pace: 97, shooting: 90, passing: 80, dribbling: 92, defending: 39, physicality: 78 },
            { name: "Kevin De Bruyne",       overall: 91, nationality: "Belgium",     flag: "🇧🇪", position: "CM",  pace: 76, shooting: 86, passing: 93, dribbling: 87, defending: 64, physicality: 78 },
            { name: "Neymar Jr",             overall: 89, nationality: "Brazil",      flag: "🇧🇷", position: "LW",  pace: 91, shooting: 83, passing: 84, dribbling: 94, defending: 37, physicality: 62 },
            { name: "Robert Lewandowski",    overall: 89, nationality: "Poland",      flag: "🇵🇱", position: "ST",  pace: 78, shooting: 92, passing: 79, dribbling: 86, defending: 44, physicality: 82 },
            { name: "Mohamed Salah",         overall: 89, nationality: "Egypt",       flag: "🇪🇬", position: "RW",  pace: 91, shooting: 88, passing: 80, dribbling: 88, defending: 45, physicality: 76 },
            { name: "Sadio Mané",            overall: 88, nationality: "Senegal",     flag: "🇸🇳", position: "LW",  pace: 91, shooting: 83, passing: 78, dribbling: 86, defending: 44, physicality: 74 },
            { name: "Vinicius Jr",           overall: 88, nationality: "Brazil",      flag: "🇧🇷", position: "LW",  pace: 95, shooting: 81, passing: 73, dribbling: 92, defending: 28, physicality: 67 },
            { name: "Thibaut Courtois",      overall: 88, nationality: "Belgium",     flag: "🇧🇪", position: "GK",  pace: 75, shooting: 75, passing: 75, dribbling: 75, defending: 75, physicality: 75 },
            { name: "Casemiro",              overall: 88, nationality: "Brazil",      flag: "🇧🇷", position: "CDM", pace: 58, shooting: 65, passing: 78, dribbling: 73, defending: 89, physicality: 90 },
            { name: "Karim Benzema",         overall: 88, nationality: "France",      flag: "🇫🇷", position: "ST",  pace: 76, shooting: 87, passing: 80, dribbling: 86, defending: 38, physicality: 77 },
            { name: "Heung-min Son",         overall: 88, nationality: "South Korea", flag: "🇰🇷", position: "LW",  pace: 88, shooting: 86, passing: 81, dribbling: 86, defending: 43, physicality: 70 },
            { name: "Marc-André ter Stegen", overall: 88, nationality: "Germany",     flag: "🇩🇪", position: "GK",  pace: 75, shooting: 75, passing: 75, dribbling: 75, defending: 75, physicality: 75 },
            { name: "Virgil van Dijk",       overall: 88, nationality: "Netherlands", flag: "🇳🇱", position: "CB",  pace: 71, shooting: 55, passing: 70, dribbling: 71, defending: 90, physicality: 88 },
            { name: "Luka Modric",           overall: 88, nationality: "Croatia",     flag: "🇭🇷", position: "CM",  pace: 79, shooting: 76, passing: 90, dribbling: 87, defending: 68, physicality: 67 },
            { name: "Joshua Kimmich",        overall: 88, nationality: "Germany",     flag: "🇩🇪", position: "CM",  pace: 67, shooting: 70, passing: 90, dribbling: 82, defending: 84, physicality: 76 },
            { name: "Rúben Dias",            overall: 87, nationality: "Portugal",    flag: "🇵🇹", position: "CB",  pace: 68, shooting: 45, passing: 68, dribbling: 66, defending: 90, physicality: 85 },
            { name: "Bernardo Silva",        overall: 87, nationality: "Portugal",    flag: "🇵🇹", position: "CM",  pace: 82, shooting: 78, passing: 87, dribbling: 89, defending: 63, physicality: 66 },
            { name: "Alisson",               overall: 87, nationality: "Brazil",      flag: "🇧🇷", position: "GK",  pace: 75, shooting: 75, passing: 75, dribbling: 75, defending: 75, physicality: 75 }
        ];

        const minRating = 85;
        const maxRating = 92;
        const container = document.getElementById("rows");

        const statKeys = [
            { key: "pace",        label: "Pace"        },
            { key: "shooting",    label: "Shooting"    },
            { key: "passing",     label: "Passing"     },
            { key: "dribbling",   label: "Dribbling"   },
            { key: "defending",   label: "Defending"   },
            { key: "physicality", label: "Physicality" }
        ];

        function getInitials(name) {
            return name.split(' ')
                .filter(w => w.length > 1)
                .slice(0, 2)
                .map(w => w[0])
                .join('');
        }

        players.forEach((player, i) => {
            const rank = i + 1;
            const isTop = player.overall >= 91;
            const pct = ((player.overall - minRating) / (maxRating - minRating)) * 100;
            const panelDirection = i < 3 ? "below" : "above";
            const initials = getInitials(player.name);

            const statRowsHTML = statKeys.map(s => `
                <div class="stat-row">
                    <div class="stat-label">${s.label}</div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill" style="width: ${player[s.key]}%"></div>
                    </div>
                    <div class="stat-value">${player[s.key]}</div>
                </div>
            `).join("");

            const row = document.createElement("div");
            row.className = "player-row";

            row.innerHTML = `
                <div class="rank ${isTop ? 'top' : ''}">${rank}</div>
                <div class="player-name">${player.name}</div>
                <div class="position-badge">
                    <span class="pos-${player.position}">${player.position}</span>
                </div>
                <div class="nationality">
                    <span class="flag">${player.flag}</span>
                    <span>${player.nationality}</span>
                </div>
                <div class="bar-container">
                    <div class="bar-fill" data-pct="${pct}"></div>
                </div>
                <div class="overall ${isTop ? 'top' : ''}">${player.overall}</div>
                <div class="stats-panel ${panelDirection}">
                    <div class="panel-header">
                        <div class="panel-avatar">${initials}</div>
                        <div>
                            <div class="panel-name">${player.name}</div>
                            <div class="panel-meta">${player.flag} ${player.nationality} · ${player.position}</div>
                        </div>
                    </div>
                    <hr class="panel-divider">
                    ${statRowsHTML}
                </div>
            `;

            container.appendChild(row);

            setTimeout(() => {
                row.classList.add("visible");
                const bar = row.querySelector(".bar-fill");
                setTimeout(() => {
                    bar.style.width = pct + "%";
                }, 100);
            }, 2400 + (i * 60));
        });
    </script>

</body>
</html>
